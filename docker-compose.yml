services:
  db:
    image: alpine:3.20
    command: ["sh", "-c", "mkdir -p /var/lib/apom-db && tail -f /dev/null"]
    volumes:
      - db-data:/var/lib/apom-db
    healthcheck:
      test: ["CMD", "test", "-d", "/var/lib/apom-db"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend-migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env.compose
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/var/lib/apom-db/production.db}
    volumes:
      - db-data:/var/lib/apom-db
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "prisma:migrate:deploy"]
    restart: "no"
    profiles: ["deploy"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env.compose
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/var/lib/apom-db/production.db}
    volumes:
      - db-data:/var/lib/apom-db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/health/ready').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./ops/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db-data:
